name: Build APK

on:
  push:
    branches: [main]

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create project structure
        run: |
          mkdir -p android/app/src/main/assets/www
          mkdir -p android/app/src/main/java/com/basicenglish/app
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/gradle/wrapper

      - name: Copy web app
        run: cp index.html android/app/src/main/assets/www/index.html

      - name: Write AndroidManifest.xml
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.basicenglish.app">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="Basic English"
                android:theme="@style/AppTheme"
                android:usesCleartextTraffic="true">
              <activity
                  android:name=".MainActivity"
                  android:exported="true"
                  android:screenOrientation="portrait">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

      - name: Write MainActivity.java
        run: |
          cat > android/app/src/main/java/com/basicenglish/app/MainActivity.java << 'EOF'
          package com.basicenglish.app;
          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebChromeClient;
          public class MainActivity extends Activity {
              private WebView webView;
              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  webView = findViewById(R.id.webview);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/www/index.html");
              }
              @Override public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

      - name: Write layout
        run: |
          cat > android/app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
            <WebView android:id="@+id/webview"
                android:layout_width="match_parent" android:layout_height="match_parent"/>
          </RelativeLayout>
          EOF

      - name: Write strings and styles
        run: |
          echo '<resources><string name="app_name">Basic English</string></resources>' \
            > android/app/src/main/res/values/strings.xml
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="android:Theme.Material.NoActionBar">
              <item name="android:statusBarColor">#1A1A2E</item>
            </style>
          </resources>
          EOF

      - name: Copy icons
        run: |
          cp icon-72.png  android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icon-72.png  android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icon-96.png  android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icon-144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icon-192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Write build.gradle files
        run: |
          cat > android/build.gradle << 'EOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > android/settings.gradle << 'EOF'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "BasicEnglish"
          include ':app'
          EOF

          echo 'org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true' > android/gradle.properties

          cat > android/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.basicenglish.app'
            compileSdk 34
            defaultConfig {
              applicationId "com.basicenglish.app"
              minSdk 21
              targetSdk 34
              versionCode 1
              versionName "1.0"
            }
            buildTypes {
              release { minifyEnabled false }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Write gradle wrapper
        run: |
          mkdir -p android/gradle/wrapper
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Build debug APK
        working-directory: android
        run: |
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BasicEnglish-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
